<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { margin: 0; padding: 0; background: #f8fafc; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #f8fafc;
        }
        .map-header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 1000;
            background: #ffffff;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-family: 'Inter', sans-serif;
            border: 1px solid #e2e8f0;
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.1rem;
            color: #2563eb;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .country-label {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #1e40af;
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,1));
        }
        .label-community {
            color: #be185d; /* Vibrant Rose */
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 900;
            text-transform: none;
            text-align: center;
            line-height: 1.1;
            filter: drop-shadow(0 0 12px rgba(255,255,255,1));
            pointer-events: none;
        }
        .community-pin {
            background: #db2777; /* Vibrant Rose */
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 10px 15px -3px rgba(219, 39, 119, 0.3);
        }
        .label-neighbor {
            color: #94a3b8;
            font-size: 22px;
            font-weight: 700;
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1><span>🇸🇻</span> EL SALVADOR</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9);

    const focusStyle = {
        fillColor: "#3b82f6", // Professional Sapphire Blue
        color: "#2563eb",     // Rich Blue border
        weight: 1.5,
        opacity: 1,
        fillOpacity: 0.35     // Professional, transparent but clear
    };

    const communityStyle = {
        fillColor: "#ffffff",
        color: "#db2777", // Vibrant Rose
        weight: 3,
        opacity: 1,
        fillOpacity: 0.8
    };

    const backgroundStyle = {
        fillColor: "transparent",
        color: "#cbd5e1",
        weight: 2,
        opacity: 1
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [200, 50]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [caRes, sfeRes] = await Promise.all([
                fetch('central_america.geojson'),
                fetch('sfe_community.geojson')
            ]);
            
            const data = await caRes.json();
            const sfeData = await sfeRes.json();

            const esFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'SLV');
            const gtmFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'GTM');
            const hndFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'HND');

            if (gtmFeature) L.geoJSON(gtmFeature, { style: backgroundStyle }).addTo(map);
            if (hndFeature) L.geoJSON(hndFeature, { style: backgroundStyle }).addTo(map);
            if (esFeature) L.geoJSON(esFeature, { style: focusStyle }).addTo(map);

            // Add the Community Border
            L.geoJSON(sfeData, { style: communityStyle }).addTo(map);

            // Add the Community Pin Marker
            const sfeCoords = [13.8833, -88.9500];
            L.marker(sfeCoords, {
                icon: L.divIcon({
                    className: 'community-pin',
                    iconSize: [20, 20],
                    iconAnchor: [10, 20]
                }),
                interactive: false
            }).addTo(map);

            // Tighter cluster for high-quality static export
            addLabel([14.22, -90.1], 'Guatemala', 'label-neighbor');
            addLabel([14.18, -88.35], 'Honduras', 'label-neighbor');
            addLabel([13.62, -88.9], 'El Salvador', 'label-es'); 
            
            // Community label - sharp and high-contrast
            addLabel([14.05, -88.95], 'San Francisco<br>Echeverría', 'label-community');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

    loadMap();
</script>

</script>
</body>
</html>
