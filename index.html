<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; background: #f0f0f0; }
        .map-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
        }
        .country-label {
            color: #333;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 0px white, -1px -1px 0px white, 1px -1px 0px white, -1px 1px 0px white;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="map-title">
    <h1>El Salvador & Neighbors</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize the map with a slightly closer zoom (8.5 if supported, or 9)
    // We center it slightly more to the west to balance the neighboring country visibility
    const map = L.map('map').setView([13.7942, -89.0], 8);

    // Style for El Salvador (Main focus)
    const focusStyle = {
        fillColor: "#3388ff",
        color: "#0044aa",
        weight: 3,
        opacity: 1,
        fillOpacity: 0.3
    };

    // Style for neighboring countries (Quiet)
    const backgroundStyle = {
        fillColor: "#aaaaaa",
        color: "#777777",
        weight: 1.5,
        opacity: 0.5,
        fillOpacity: 0.05
    };

    // Function to add labels using L.marker with DivIcon
    function addLabel(latlng, text) {
        const labelIcon = L.divIcon({
            className: 'country-label',
            html: `<b>${text}</b>`,
            iconSize: [100, 20]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    // Function to load and add GeoJSON to map
    async function addLayer(url, style, labelText, labelPos) {
        try {
            const response = await fetch(url);
            const data = await response.json();
            L.geoJSON(data, { style: style }).addTo(map);
            if (labelText && labelPos) {
                addLabel(labelPos, labelText);
            }
        } catch (error) {
            console.error('Error loading GeoJSON:', url, error);
        }
    }

    // Load layers with labels
    addLayer('guatemala.geojson', backgroundStyle, 'GUATEMALA', [14.6, -90.5]);
    addLayer('honduras.geojson', backgroundStyle, 'HONDURAS', [14.5, -87.5]);
    addLayer('el_salvador.geojson', focusStyle, 'EL SALVADOR', [13.7, -88.9]);

</script>
</body>
</html>
