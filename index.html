<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap');

        body { margin: 0; padding: 0; background: #0a0a0c; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #0a0a0c;
        }
        .map-header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            border-radius: 100px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'Space Grotesk', sans-serif;
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }
        .country-label {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #ff00ff;
            font-size: 20px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }
        .label-neighbor {
            color: #ffffff;
            font-size: 11px;
            opacity: 0.8;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1>El Salvador . 🇸🇻</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -89.0], 9);

    const focusStyle = {
        fillColor: "#ff00ff",
        color: "#ff00ff",
        weight: 3,
        opacity: 1,
        fillOpacity: 0.15
    };

    const backgroundStyle = {
        fillColor: "#333",
        color: "#555",
        weight: 1.5,
        opacity: 0.6,
        fillOpacity: 0.05
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [120, 20]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [es, gtm, hnd] = await Promise.all([
                fetch('el_salvador.geojson').then(r => r.json()),
                fetch('guatemala.geojson').then(r => r.json()),
                fetch('honduras.geojson').then(r => r.json())
            ]);

            L.geoJSON(gtm, { style: backgroundStyle }).addTo(map);
            L.geoJSON(hnd, { style: backgroundStyle }).addTo(map);
            L.geoJSON(es, { style: focusStyle }).addTo(map);

            // Labels moved much closer to the borders
            addLabel([14.3, -89.6], 'Guatemala', 'label-neighbor');
            addLabel([14.1, -88.1], 'Honduras', 'label-neighbor');
            addLabel([13.75, -88.9], 'El Salvador', 'label-es');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

</script>
</body>
</html>
