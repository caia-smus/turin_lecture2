<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Salvador Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        body { margin: 0; padding: 0; background: #f0f7ff; overflow: hidden; }
        #map { 
            height: 100vh; 
            width: 100vw; 
            background: #f0f7ff; /* Vibrant light sky background */
        }
        .map-header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            padding: 14px 28px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
            font-family: 'Plus Jakarta Sans', sans-serif;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .map-header h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }
        .country-label {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .label-es {
            color: #1e3a8a;
            font-size: 28px; /* Larger for image export */
            font-weight: 800;
            filter: drop-shadow(0 0 10px rgba(255,255,255,1));
            pointer-events: none;
        }
        .label-community {
            color: #ea580c; /* Vibrant Orange */
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px; /* Larger for image export */
            font-weight: 800;
            text-transform: none;
            text-align: center;
            line-height: 1.1;
            filter: drop-shadow(0 0 8px rgba(255,255,255,1));
            pointer-events: none;
        }
        .community-pin {
            background: #f97316; /* Vibrant Orange */
            border: 2px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
        .label-neighbor {
            color: #475569;
            font-size: 20px; /* Larger for image export */
            font-weight: 700;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.9));
        }
        .leaflet-control-attribution {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="map-header">
    <h1><span>🇸🇻</span> EL SALVADOR</h1>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        touchZoom: false,
        boxZoom: false,
        dragging: true
    }).setView([13.85, -88.9], 9);

    // Styles
    const focusStyle = {
        fillColor: "#4f46e5", // Bold Indigo
        color: "#312e81",     // Dark Indigo border
        weight: 3,
        opacity: 1,
        fillOpacity: 0.15
    };

    const communityStyle = {
        fillColor: "#ffffff",
        color: "#ea580c", // Vibrant Orange border
        weight: 2,
        opacity: 1,
        fillOpacity: 0.6
    };

    const backgroundStyle = {
        fillColor: "#94a3b8",
        color: "#64748b",
        weight: 1.5,
        opacity: 0.4,
        fillOpacity: 0.08
    };

    function addLabel(latlng, text, extraClass = '') {
        const labelIcon = L.divIcon({
            className: `country-label ${extraClass}`,
            html: text,
            iconSize: [160, 40]
        });
        L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(map);
    }

    async function loadMap() {
        try {
            const [caRes, sfeRes] = await Promise.all([
                fetch('central_america.geojson'),
                fetch('sfe_community.geojson')
            ]);
            
            const data = await caRes.json();
            const sfeData = await sfeRes.json();

            // Filter the unified data for our target countries
            const esFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'SLV');
            const gtmFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'GTM');
            const hndFeature = data.features.find(f => f.properties['ISO3166-1-Alpha-3'] === 'HND');

            if (gtmFeature) L.geoJSON(gtmFeature, { style: backgroundStyle }).addTo(map);
            if (hndFeature) L.geoJSON(hndFeature, { style: backgroundStyle }).addTo(map);
            if (esFeature) L.geoJSON(esFeature, { style: focusStyle }).addTo(map);

            // Add the Community Border
            L.geoJSON(sfeData, { style: communityStyle }).addTo(map);

            // Add the Community Pin Marker
            const sfeCoords = [13.8833, -88.9500];
            L.marker(sfeCoords, {
                icon: L.divIcon({
                    className: 'community-pin',
                    iconSize: [16, 16],
                    iconAnchor: [8, 16]
                }),
                interactive: false
            }).addTo(map);

            // Add Labels - Tighter composition for image export
            // Guatemala: Moved closer to border and more central
            addLabel([14.25, -90.1], 'Guatemala', 'label-neighbor');
            
            // Honduras: Moved closer to border
            addLabel([14.2, -88.4], 'Honduras', 'label-neighbor');
            
            // El Salvador: Moved slightly higher for a more central feel
            addLabel([13.65, -88.9], 'El Salvador', 'label-es'); 
            
            // Community label
            addLabel([13.98, -88.95], 'San Francisco<br>Echeverría', 'label-community');

        } catch (error) {
            console.error('Error rendering map:', error);
        }
    }

    loadMap();
</script>

    loadMap();
</script>

</script>
</body>
</html>
